<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Hướng Dẫn Du Lịch TP.HCM</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <header class="header">
    <h2>🗺️ Bản Đồ Du Lịch TP.HCM</h2>
    <p>Khám phá các điểm tham quan nổi bật</p>
  </header>

  <main>
    <div class="map-section">
      <div id="map">Đang tải bản đồ...</div>
    </div>
    <div class="list-section">
      <h3>Danh sách địa điểm</h3>
      <div id="points"></div>
      <button id="btnRoute">Tính lộ trình</button>
    </div>
  </main>

  <footer>© 2025 Hướng Dẫn Du Lịch TP.HCM</footer>

  <script>
  let allPoints = [];

  async function loadPoints() {
      const res = await fetch('/api/map');
      allPoints = await res.json();
      const list = document.getElementById('points');
      list.innerHTML = allPoints.map(p =>
          `<div><input type="checkbox" value="${p.id}"> ${p.name} (${p.quan})</div>`
      ).join('');
  }

  async function calcRoute() {
      const checked = [...document.querySelectorAll('#points input:checked')]
          .map(c => parseInt(c.value));
      const selected = allPoints.filter(p => checked.includes(p.id));
      if (selected.length < 2) return alert("Chọn ít nhất 2 điểm!");

      const res = await fetch('/api/route', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({points: selected})
      });
      const data = await res.json();
      document.getElementById('map').innerHTML = data.map_html;
  }

  document.getElementById('btnRoute').addEventListener('click', calcRoute);
  loadPoints();
  </script>
</body>
</html>
