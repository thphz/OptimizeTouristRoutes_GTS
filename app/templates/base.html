<!doctype html>
<html lang="vi">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>{% block title %}Optimize Routes{% endblock %}</title>

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-" crossorigin="anonymous">

		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
		
		<!-- Font Awesome for additional icons -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">

		<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
		<!-- Leaflet CSS -->
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
		{% block head %}{% endblock %}
	</head>
	<body>
		<header class="bg-primary text-white py-3 mb-4 shadow-sm">
			<div class="container d-flex align-items-center justify-content-between">
				<div class="d-flex align-items-center">
					<i class="bi bi-geo-alt-fill fs-3 me-2"></i>
					<div>
						<h5 class="mb-0">Hướng Dẫn Du Lịch TP.HCM</h5>
						<small>Khám phá danh thắng lịch sử Sài Gòn</small>
					</div>
				</div>
				<div>
					<small>Design By Nhóm 1</small>
				</div>
			</div>
		</header>

		<main class="container mb-5">
			{% block content %}{% endblock %}
		</main>

		<footer class="bg-dark text-white py-2 mt-auto">
			<div class="container text-center small">© 2025 Hướng Dẫn Du Lịch TP.HCM - Khám phá vẻ đẹp Sài Gòn</div>
		</footer>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-" crossorigin="anonymous"></script>
		<!-- Leaflet JS (must be before our map code) -->
		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
		<script src="{{ url_for('static', filename='js/map.js') }}"></script>
		<script src="{{ url_for('static', filename='js/select.js') }}"></script>
		{% block scripts %}{% endblock %}
	</body>
</html>
