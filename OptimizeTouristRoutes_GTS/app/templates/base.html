<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    <title>{% block title %}Trang Chủ{% endblock %} - Optimize Routes</title>
</head>
<body class="bg-light">

    <header class="bg-primary text-white py-3 shadow-sm">
        <div class="container-fluid px-4 d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <i class="bi bi-geo-alt-fill fs-3 me-2"></i>
                <div>
                    <h5 class="mb-0">Hướng Dẫn Du Lịch TP.HCM</h5>
                    <small>Khám phá danh thắng lịch sử Sài Gòn</small>
                </div>
            </div>
            <div>
                <small>Design By Nhóm 1</small>
            </div>
        </div>
    </header>
    <main class="container-fluid px-4 py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
