<!doctype html>
<html>
<head>
    <title>Chọn điểm tham quan</title>
</head>
<body>
<h1>Chọn điểm</h1>
<form method="post">
    {% for d in diems %}
        <input type="checkbox" name="selected_diems" value="{{ d.DiemID }}"> {{ d.TenDiem }}<br>
    {% endfor %}
    <button type="submit">Tìm tuyến</button>
</form>
{% if error %}<p style="color:red">{{ error }}</p>{% endif %}
</body>
</html>
